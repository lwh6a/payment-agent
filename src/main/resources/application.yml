server:
  port: 8088

spring:
  application:
    name: payment-agent
  datasource:                   # DB Tool 只读查询数据源（务必使用只读账号，连接在首次查询时才建立）
    url: ${DB_URL:jdbc:mysql://localhost:3306/pay_core?useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:readonly}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    openai:
      api-key: ${LLM_API_KEY}
      base-url: ${LLM_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${LLM_MODEL:gpt-4o}
          temperature: 0.1        # 排障场景需要确定性高的输出
          max-tokens: 4096

# Agent 自定义配置
agent:
  session:
    max-history: 20             # 单会话记忆窗口的最大消息数（ChatMemory 滑动窗口）
  llm:
    timeout-seconds: 60         # LLM 单次请求响应超时（同步与流式）
  tool:
    db:
      readonly: true            # Tool 层数据库强制只读
      allowed-tables:           # 排障可访问的表白名单
        - pay_order
        - pay_item
        - refund_record
        - ledger_order
        - ledger_item
        - pay_callback_log
        - config_merchant
        - config_rule
        - tx_record
    log:
      max-results: 100          # 单次日志查询最大返回条数
      max-time-range-days: 7    # 最大查询时间跨度
      cls:                      # 腾讯云 CLS 日志服务（不配置则日志工具查询时提示未接入）
        secret-id: ${CLS_SECRET_ID:}
        secret-key: ${CLS_SECRET_KEY:}
        region: ${CLS_REGION:ap-guangzhou}
        topic-id: ${CLS_TOPIC_ID:}
    channel:
      timeout-seconds: 10       # 渠道查询超时
    mq:
      name-server: ${MQ_NAME_SERVER:localhost:9876}   # RocketMQ NameServer
    xxljob:                     # XXL-JOB 控制台（只读查询任务与执行日志）
      admin-url: ${XXLJOB_ADMIN_URL:}
      username: ${XXLJOB_USERNAME:}
      password: ${XXLJOB_PASSWORD:}
    jenkins:                    # Jenkins（只读查询发版记录）
      url: ${JENKINS_URL:}
      username: ${JENKINS_USERNAME:}
      api-token: ${JENKINS_API_TOKEN:}
      job-path: ${JENKINS_JOB_PATH:}
    nacos:                      # Nacos 配置中心（只读查询配置内容）
      server-addr: ${NACOS_SERVER_ADDR:}
      namespace: ${NACOS_NAMESPACE:}
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}

logging:
  level:
    com.wenhao.pay.agent: INFO

# 可观测性：Spring AI 自带 ChatClient / Tool 调用指标（gen_ai.*），经 actuator 暴露
management:
  endpoints:
    web:
      exposure:
        include: health,metrics
